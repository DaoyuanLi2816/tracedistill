  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>
  <rect x="0" y="0" width="10" height="300" fill="#76B900"/>

  <!-- Title block -->
  <text x="60" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#e6edf3">NVIDIA Nemotron Model</text>
  <text x="60" y="146" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#e6edf3">Reasoning Challenge</text>
  <text x="62" y="188" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#76B900">Silver Medal &#183; 65 / 4163 teams &#183; Top 1.6% &#183; Team VCDAD</text>

  <!-- Tag pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="600">
    <rect x="60"  y="222" width="206" height="38" rx="19" fill="#15202b" stroke="#2a3441"/>
    <text x="163" y="247" fill="#c9d1d9" text-anchor="middle">Two-Phase LoRA SFT</text>
    <rect x="278" y="222" width="226" height="38" rx="19" fill="#15202b" stroke="#2a3441"/>
    <text x="391" y="247" fill="#c9d1d9" text-anchor="middle">Trace-Distillation</text>
    <rect x="516" y="222" width="234" height="38" rx="19" fill="#15202b" stroke="#2a3441"/>
    <text x="633" y="247" fill="#c9d1d9" text-anchor="middle">Mamba-MoE 30B-A3B</text>
    <rect x="762" y="222" width="132" height="38" rx="19" fill="#15202b" stroke="#2a3441"/>
    <text x="828" y="247" fill="#c9d1d9" text-anchor="middle">rank &#8804; 32</text>
