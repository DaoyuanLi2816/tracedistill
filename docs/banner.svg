<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="tracedistill — distill reasoning traces into a LoRA adapter. Silver medal, NVIDIA Nemotron Model Reasoning Challenge.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#10161f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#76B900" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#76B900" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="0.5" stop-color="#c7ccd4"/>
      <stop offset="1" stop-color="#9aa1ad"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9aa1ad"/>
      <stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>
  <rect x="0" y="0" width="10" height="300" fill="#76B900"/>

  <!-- Wordmark -->
  <text x="58" y="96" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800">
    <tspan fill="#e6edf3">trace</tspan><tspan fill="#76B900">distill</tspan>
  </text>
  <!-- Tagline -->
  <text x="60" y="138" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#c9d1d9">Distill teacher chains-of-thought into a LoRA adapter —</text>
  <text x="60" y="168" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" fill="#c9d1d9">so the model re-derives every answer itself.</text>
  <text x="62" y="200" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#76B900">Silver Medal &#183; 65 / 4163 (Top 1.6%) &#183; NVIDIA Nemotron Reasoning Challenge</text>

  <!-- Stage / feature chips -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <rect x="60"  y="224" width="178" height="36" rx="18" fill="#15202b" stroke="#2a3441"/>
    <text x="149" y="248" fill="#c9d1d9" text-anchor="middle">&#60;think&#62;…&#62;\boxed{}</text>
    <rect x="250" y="224" width="168" height="36" rx="18" fill="#15202b" stroke="#2a3441"/>
    <text x="334" y="248" fill="#c9d1d9" text-anchor="middle">Train &#8594; Nudge</text>
    <rect x="430" y="224" width="156" height="36" rx="18" fill="#15202b" stroke="#2a3441"/>
    <text x="508" y="248" fill="#c9d1d9" text-anchor="middle">type-stratified</text>
    <rect x="598" y="224" width="158" height="36" rx="18" fill="#15202b" stroke="#2a3441"/>
    <text x="677" y="248" fill="#c9d1d9" text-anchor="middle">Mamba-aware</text>
  </g>

  <!-- pip install pill -->
  <g font-family="'JetBrains Mono', 'Consolas', monospace" font-size="15">
    <rect x="60" y="270" width="250" height="22" rx="6" fill="#0d1117" stroke="#2a3441"/>
    <text x="72" y="285" fill="#8b949e">$ </text>
    <text x="86" y="285" fill="#e6edf3">pip install tracedistill</text>
  </g>

  <!-- Silver medal motif (credential) -->
  <g transform="translate(1040,118)">
    <path d="M-46,-96 L-14,-96 L6,-20 L-26,-20 Z" fill="url(#ribbon)"/>
    <path d="M46,-96 L14,-96 L-6,-20 L26,-20 Z" fill="url(#ribbon)"/>
    <circle cx="0" cy="34" r="74" fill="url(#silver)" stroke="#7f8794" stroke-width="3"/>
    <circle cx="0" cy="34" r="58" fill="none" stroke="#8b929e" stroke-width="2" stroke-opacity="0.6"/>
    <text x="0" y="20" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#3a3f47" text-anchor="middle">SILVER</text>
    <text x="0" y="56" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="#2b2f36" text-anchor="middle">65</text>
  </g>
</svg>
