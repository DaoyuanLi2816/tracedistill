<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1460" width="100%" font-family="'Segoe UI',system-ui,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">NVIDIA-NMRC two-phase fine-tuning — end-to-end pipeline</title>
  <desc id="d">From data source, split, and record construction, to base + LoRA, Phase 1 broad training and Phase 2 fine nudging, then packaging, submission, and host-side evaluation.</desc>
  <style>
    text { font-family: 'Segoe UI',system-ui,sans-serif; }
    .mono { font-family: 'Consolas','Courier New',monospace; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="960" height="1460" fill="#FBFCFE"/>

  <!-- header -->
  <text x="40" y="50" font-size="27" font-weight="700" fill="#0F172A">The pipeline at a glance</text>
  <text x="40" y="78" font-size="13" fill="#64748B">NVIDIA-NMRC · two-phase Train → Nudge · data → train → package → eval, end to end</text>

  <!-- legend -->
  <rect x="636" y="18" width="308" height="84" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="652" y="38" font-size="12" font-weight="700" fill="#0F172A">Legend</text>
  <rect x="652" y="48" width="14" height="11" rx="2" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="672" y="58" font-size="10.5" fill="#475569">Phase 1 (Train)</text>
  <rect x="652" y="68" width="14" height="11" rx="2" fill="#ECFEFF" stroke="#0891B2"/>
  <text x="672" y="78" font-size="10.5" fill="#475569">Phase 2 (Nudge)</text>
  <rect x="800" y="63" width="14" height="11" rx="2" fill="#FFFFFF" stroke="#94A3B8" stroke-dasharray="3 2"/>
  <text x="820" y="73" font-size="10.5" fill="#475569">Eval (not this script)</text>

  <!-- (1) data source -->
  <rect x="280" y="128" width="400" height="86" rx="14" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#soft)"/>
  <text x="300" y="156" font-size="14" font-weight="700" fill="#0F172A">① Data source · dgxchen/nemotron-cot-tong</text>
  <text x="300" y="178" font-size="11.5" fill="#475569" class="mono">columns: type / prompt / answer / generated_cot</text>
  <text x="300" y="198" font-size="11" fill="#64748B">CoT generated upstream → this script does only student-side distillation</text>

  <line x1="480" y1="214" x2="480" y2="240" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="231" font-size="11" fill="#64748B">9,500 samples · shuffled (seed=42)</text>

  <!-- (2) split -->
  <rect x="110" y="240" width="740" height="170" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="130" y="268" font-size="14" font-weight="700" fill="#0F172A">② Split · into two non-overlapping sets</text>
  <text x="130" y="290" font-size="10.5" fill="#64748B" class="mono">HARD_TYPES = { cryptarithm_deduce, cryptarithm_guess, equation_numeric_guess } → rest are easy</text>

  <rect x="140" y="304" width="330" height="94" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="158" y="328" font-size="13" font-weight="700" fill="#0F172A">Epoch-1 set <tspan font-weight="400" fill="#64748B" font-size="11">(for Phase 1)</tspan></text>
  <text x="158" y="352" font-size="11.5" fill="#475569">all hard +</text>
  <text x="158" y="372" font-size="11.5" fill="#475569">remaining easy (minus the nudge reserve)</text>

  <rect x="520" y="304" width="310" height="94" rx="12" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="538" y="328" font-size="13" font-weight="700" fill="#0F172A">Nudge set <tspan font-weight="400" fill="#64748B" font-size="11">(for Phase 2)</tspan></text>
  <text x="538" y="352" font-size="11.5" fill="#475569">all hard + n of each easy type</text>
  <text x="538" y="372" font-size="11" fill="#64748B">n = size of the rarest hard type (balanced)</text>

  <line x1="480" y1="410" x2="480" y2="436" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="427" font-size="11" fill="#64748B">each set goes through build_records</text>

  <!-- (3) build_records -->
  <rect x="150" y="436" width="660" height="150" rx="16" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#soft)"/>
  <text x="172" y="466" font-size="14" font-weight="700" fill="#0F172A">③ build_records — the training target's format contract</text>
  <text x="172" y="488" font-size="11" fill="#64748B">user = prompt + \boxed instruction suffix (matches eval);  assistant = the sequence below:</text>

  <rect x="172" y="500" width="92" height="34" rx="8" fill="#E0E7FF" stroke="#A5B4FC"/>
  <text x="218" y="522" font-size="12" fill="#3730A3" text-anchor="middle" class="mono">&lt;think&gt;</text>
  <rect x="270" y="500" width="286" height="34" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="413" y="522" font-size="11" fill="#475569" text-anchor="middle">… upstream CoT (its own \boxed stripped) …</text>
  <rect x="562" y="500" width="96" height="34" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="610" y="522" font-size="12" fill="#166534" text-anchor="middle" class="mono">&lt;/think&gt;</text>
  <rect x="664" y="500" width="124" height="34" rx="8" fill="#FEF9C3" stroke="#FDE047"/>
  <text x="726" y="521" font-size="11.5" fill="#854D0E" text-anchor="middle" class="mono">\boxed{answer}</text>

  <text x="218" y="552" font-size="10.5" fill="#6366F1" text-anchor="middle">▲ added by template</text>
  <text x="413" y="552" font-size="10.5" fill="#64748B" text-anchor="middle">▲ reasoning from upstream, \boxed stripped</text>
  <text x="610" y="552" font-size="10.5" fill="#16A34A" text-anchor="middle">▲ added here</text>
  <text x="726" y="552" font-size="10.5" fill="#CA8A04" text-anchor="middle">▲ official answer</text>
  <text x="172" y="574" font-size="10.5" fill="#94A3B8">apply_chat_template(enable_thinking=True) → this structure must match the eval protocol byte-for-byte</text>

  <line x1="480" y1="586" x2="480" y2="612" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- (4) base + LoRA -->
  <rect x="230" y="612" width="500" height="96" rx="14" fill="#F1F5F9" stroke="#CBD5E1" filter="url(#soft)"/>
  <rect x="250" y="625" width="56" height="22" rx="11" fill="#475569"/>
  <text x="278" y="640" font-size="11" fill="#FFFFFF" text-anchor="middle">model</text>
  <text x="316" y="642" font-size="14" font-weight="700" fill="#0F172A">④ Base model + attach LoRA</text>
  <text x="250" y="670" font-size="11.5" fill="#475569">Nemotron-3-Nano-30B-A3B-BF16 · hybrid Mamba / MoE · ~3.5B active</text>
  <text x="250" y="692" font-size="11.5" fill="#475569" class="mono">LoRA rank=32 alpha=32 dropout=0 · targets include Mamba in/out_proj</text>

  <line x1="480" y1="708" x2="480" y2="732" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- (5) two-phase container -->
  <rect x="90" y="732" width="780" height="470" rx="20" fill="#FCFDFE" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="112" y="762" font-size="15" font-weight="700" fill="#334155">⑤ Two-phase fine-tuning · Train → Nudge<tspan font-weight="400" fill="#94A3B8" font-size="11.5">  (the core idea: train hard &amp; fast, then nudge gently)</tspan></text>

  <!-- Phase 1 -->
  <rect x="120" y="776" width="720" height="166" rx="16" fill="#FFF7ED" stroke="#FDBA74" filter="url(#soft)"/>
  <rect x="140" y="790" width="150" height="26" rx="13" fill="#EA580C"/>
  <text x="215" y="808" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Phase 1 · Train</text>
  <text x="304" y="808" font-size="12" fill="#C2410C">hard &amp; fast · coverage and speed</text>
  <text x="140" y="850" font-size="12.5" font-weight="700" fill="#9A3412">model</text>
  <text x="214" y="850" font-size="12.5" fill="#334155">base (frozen) + fresh LoRA (random init, the only trainable part)</text>
  <text x="140" y="888" font-size="12.5" font-weight="700" fill="#9A3412">input</text>
  <text x="214" y="888" font-size="12.5" fill="#334155">Epoch-1 set = all hard + most easy</text>
  <text x="140" y="926" font-size="12.5" font-weight="700" fill="#9A3412">output</text>
  <text x="214" y="926" font-size="12.5" fill="#334155">Phase 1 adapter<tspan fill="#64748B"> (saved separately → single-phase baseline)</tspan></text>

  <!-- arrow between phases -->
  <line x1="480" y1="942" x2="480" y2="984" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="496" y="967" font-size="11.5" font-weight="600" fill="#475569">LoRA weights continue (no reload) · keep training the same model</text>

  <!-- Phase 2 -->
  <rect x="120" y="984" width="720" height="166" rx="16" fill="#ECFEFF" stroke="#67E8F9" filter="url(#soft)"/>
  <rect x="140" y="998" width="156" height="26" rx="13" fill="#0891B2"/>
  <text x="218" y="1016" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Phase 2 · Nudge</text>
  <text x="310" y="1016" font-size="12" fill="#0E7490">small steps · push hard types + prevent forgetting</text>
  <text x="140" y="1058" font-size="12.5" font-weight="700" fill="#155E75">model</text>
  <text x="214" y="1058" font-size="12.5" fill="#334155">base (frozen) + Phase 1 LoRA (continued, no reload)</text>
  <text x="140" y="1096" font-size="12.5" font-weight="700" fill="#155E75">input</text>
  <text x="214" y="1096" font-size="12.5" fill="#334155">Nudge set = all hard + n of each easy type (balanced)</text>
  <text x="140" y="1134" font-size="12.5" font-weight="700" fill="#155E75">output</text>
  <text x="214" y="1134" font-size="12.5" font-weight="700" fill="#0F766E">final adapter</text>

  <line x1="480" y1="1202" x2="480" y2="1228" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="492" y="1219" font-size="11" fill="#64748B">final adapter</text>

  <!-- (6) package -->
  <rect x="200" y="1228" width="560" height="94" rx="14" fill="#ECFDF5" stroke="#6EE7B7" filter="url(#soft)"/>
  <rect x="220" y="1241" width="68" height="22" rx="11" fill="#059669"/>
  <text x="254" y="1256" font-size="11" fill="#FFFFFF" text-anchor="middle">artifact</text>
  <text x="300" y="1258" font-size="14" font-weight="700" fill="#065F46">⑥ Package submission.zip</text>
  <text x="220" y="1284" font-size="11" fill="#047857">patch adapter_config.json: official base name · inference_mode=True · dropout=0</text>
  <text x="220" y="1305" font-size="11" fill="#047857" class="mono">zip = adapter_config.json + adapter_model.safetensors only (no base weights)</text>

  <line x1="480" y1="1322" x2="480" y2="1348" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="492" y="1339" font-size="11" fill="#64748B">submit to Kaggle</text>

  <!-- (7) evaluation -->
  <rect x="230" y="1348" width="500" height="90" rx="14" fill="#FFFFFF" stroke="#94A3B8" stroke-dasharray="6 4"/>
  <text x="250" y="1376" font-size="13.5" font-weight="700" fill="#334155">⑦ Evaluation (host side · not this script)</text>
  <text x="250" y="1398" font-size="11" fill="#475569">vLLM loads base + adapter → greedy generation per question (temperature=0)</text>
  <text x="250" y="1419" font-size="11" fill="#475569">extract the answer from \boxed{} after &lt;/think&gt; → exact match / rel. error &lt;1e-2</text>
</svg>
