name: Release to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no stored API token.
# One-time setup: on PyPI, add this repo as a trusted publisher for the `tracedistill`
# project (workflow: release.yml). Then publishing happens automatically on each
# GitHub Release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
