name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      # The tested core (formatting / sampling / data / lora / config) is torch-free,
      # so CI installs only the light test extra — no GPU stack required.
      - run: pip install -e .[test]
      - run: pytest -v
